name: DebateIQ Scheduler

# Three cron triggers and one manual button. Replace these times with your
# own — defaults are tuned to IST (UTC+5:30).
on:
  schedule:
    - cron: "30 2 * * 1-5"   # Daily   — 08:00 IST weekdays
    - cron: "0 17 * * 1-5"   # Night   — 22:30 IST weekdays
    - cron: "30 3 * * 0"     # Weekend — 09:00 IST Sundays
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - night
          - weekend

# Default read-only contents permission is enough — state lives in the
# Actions cache, not in the repository, so no PII ever lands in git history.
# That makes the project safe to fork and use as-is.
permissions:
  contents: read

concurrency:
  group: debateiq-state
  cancel-in-progress: false   # serialize runs so we never clobber state mid-write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      # Vector store cache: rebuild only when the corpus or extractor changes.
      - name: Restore FAISS vector store cache
        id: faiss-cache
        uses: actions/cache@v4
        with:
          path: faiss
          key: faiss-v1-${{ hashFiles('rag/sources.json', 'rag/wpm_extractor.py', 'rag/chunking_strategy.py') }}
          restore-keys: |
            faiss-v1-

      - name: Rebuild FAISS index if missing
        if: steps.faiss-cache.outputs.cache-hit != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python rag/ingest.py

      # State cache: keeps memory/weekly_log.json across runs without writing
      # it to the repo. Cache entries auto-expire after 7 days of inactivity;
      # a daily-running scheduler keeps the cache permanently warm.
      - name: Restore weekly_log state
        id: state-cache
        uses: actions/cache@v4
        with:
          path: memory/weekly_log.json
          # Use a sliding key based on the calendar week so each Monday gets
          # a fresh cache entry; restore-keys falls back to the most recent.
          key: weekly-log-${{ github.run_id }}
          restore-keys: |
            weekly-log-

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 2 * * 1-5" ]; then
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 17 * * 1-5" ]; then
            echo "mode=night" >> "$GITHUB_OUTPUT"
          else
            echo "mode=weekend" >> "$GITHUB_OUTPUT"
          fi

      - name: Print run context
        run: |
          echo "event=${{ github.event_name }}"
          echo "mode=${{ steps.mode.outputs.mode }}"
          echo "python=$(python --version)"
          echo "uv=$(uv --version)"

      - name: Run DebateIQ
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEV_MODE: "false"
        run: python main.py --mode ${{ steps.mode.outputs.mode }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::DebateIQ ${{ steps.mode.outputs.mode }} run failed. Check the Run DebateIQ step above for details."

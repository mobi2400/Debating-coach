name: DebateIQ Scheduler

on:
  schedule:
    - cron: "30 2 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 3 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - night
          - weekend

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 2 * * 1-5" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * 1-5" ]; then
            echo "mode=night" >> $GITHUB_OUTPUT
          else
            echo "mode=weekend" >> $GITHUB_OUTPUT
          fi

      - name: Print run context
        run: |
          echo "event=${{ github.event_name }}"
          echo "mode=${{ steps.mode.outputs.mode }}"
          echo "python=$(python --version)"
          echo "uv=$(uv --version)"

      - name: Run DebateIQ
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          YOUR_WHATSAPP_NUMBER: ${{ secrets.YOUR_WHATSAPP_NUMBER }}
          DEV_MODE: "false"
        run: python main.py --mode ${{ steps.mode.outputs.mode }}
